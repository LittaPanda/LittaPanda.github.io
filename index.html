<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ideasteck 3D Experience</title>
  <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/jeromeetienne/AR.js/1.7.5/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin : 0; overflow: hidden;">
<a-scene  embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
  <a-marker type="pattern" preset="custom" url="patterns/pattern.patt">
    <!--a-box position="0 0.5 0" material="color: yellow;"></a-box-->
    <a-entity position="-1 0.5 -3" obj-model="obj: url(models/taza.obj); mtl: url(models/taza.mtl)">
    </a-entity>
  </a-marker>
  <a-entity camera></a-entity>
</a-scene>
</body>
</html>
